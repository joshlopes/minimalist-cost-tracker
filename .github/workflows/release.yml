name: release

# Publishes prebuilt binaries when a vX.Y.Z tag is pushed. modernc.org/sqlite
# is pure Go, so every target cross-compiles with CGO_ENABLED=0 from one
# runner — no per-OS matrix runners needed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: "0"
        run: |
          set -eu
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            echo "building $GOOS/$GOARCH"
            GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X github.com/lendable/minimalist-cost-tracker/internal/selfupdate.DefaultRepo=${GITHUB_REPOSITORY}" \
              -o dist/cost-tracker ./cmd/cost-tracker
            tar -czf "dist/cost-tracker_${GOOS}_${GOARCH}.tar.gz" -C dist cost-tracker
            rm dist/cost-tracker
          done
          cd dist
          sha256sum cost-tracker_*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/cost-tracker_*.tar.gz dist/SHA256SUMS \
            --title "${{ github.ref_name }}" \
            --generate-notes
