name: release

# Semver releases are driven by release-please. Every push to main updates a
# standing "release PR" that bumps the version and CHANGELOG from the
# conventional-commit history (fix -> patch, feat -> minor, feat!/BREAKING ->
# major). Merging that PR creates a *prerelease* GitHub Release; the build job
# below attaches the prebuilt binaries and only then promotes it to latest.
#
# The release is created as a prerelease (NOT a draft) on purpose. The binaries
# are built and attached by the separate, later `build` job, so if the release
# were marked latest immediately, `releases/latest` would point at an asset-less
# release for the duration of the build, and `install.sh` (which resolves
# "latest" then downloads the tarball) would 404 for anyone installing inside
# that window. `releases/latest` excludes prereleases, so the release only
# becomes "latest" once the binaries are in place (see the Publish step).
#
# Why a prerelease and not a draft: a *draft* release does not create the
# vX.Y.Z git tag, and release-please cannot find a draft release at all. In the
# same workflow run that merges a release PR, release-please immediately rebuilds
# the *next* release PR and needs the just-released version's tag to anchor the
# changelog. With a draft, that tag does not exist yet, so release-please falls
# back to walking the entire history and regenerates the whole CHANGELOG every
# time. A prerelease creates the tag immediately and is visible to release-please
# while still being hidden from `releases/latest`, satisfying both needs.
#
# The build is folded into this workflow on purpose: a tag created with the
# default GITHUB_TOKEN does NOT trigger a separate `push: tags` workflow, so a
# standalone tag-triggered release would never fire.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
          CGO_ENABLED: "0"
        run: |
          set -eu
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            echo "building $GOOS/$GOARCH"
            GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X github.com/lendable/minimalist-cost-tracker/internal/selfupdate.DefaultRepo=${GITHUB_REPOSITORY}" \
              -o dist/cost-tracker ./cmd/cost-tracker
            tar -czf "dist/cost-tracker_${GOOS}_${GOARCH}.tar.gz" -C dist cost-tracker
            rm dist/cost-tracker
          done
          cd dist
          sha256sum cost-tracker_*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/cost-tracker_*.tar.gz dist/SHA256SUMS --clobber

      # Promote the prerelease to the latest published release only after every
      # asset is attached. release-please creates the release as a *prerelease*
      # (not a draft): that creates the vX.Y.Z tag immediately, which the next
      # release-please run needs to anchor the changelog, while keeping the
      # release out of `releases/latest` (which excludes prereleases) until the
      # binaries are in place. Flipping --prerelease=false --latest here is what
      # makes "latest" resolve to this release, so it can never resolve to an
      # asset-less one.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --prerelease=false --latest

      - name: Bump Homebrew formula
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -eu
          formula="HomebrewFormula/cost-tracker.rb"
          version="${TAG#v}"
          # version line
          perl -0pi -e "s/^  version \"[^\"]*\"/  version \"${version}\"/m" "$formula"
          # per-platform sha256: anchor on the tarball name, replace the value
          # on the following sha256 line (handles both the REPLACE_WITH_*
          # placeholders and a previously-released real checksum).
          for plat in darwin_arm64 darwin_amd64 linux_arm64 linux_amd64; do
            sha="$(awk -v f="cost-tracker_${plat}.tar.gz" '$2==f {print $1}' dist/SHA256SUMS)"
            perl -0pi -e "s{(cost-tracker_${plat}\\.tar\\.gz\"\\n\\s*sha256 \")[^\"]*}{\${1}${sha}}" "$formula"
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$formula"
          if git diff --cached --quiet; then
            echo "formula already up to date"
          else
            # chore(release) commits are ignored by release-please, so this push
            # won't trigger another version bump.
            git commit -m "chore(release): update Homebrew formula to ${TAG}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
